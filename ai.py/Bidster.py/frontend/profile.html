<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Profile</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="profile.js"></script>
</head>
<body>
<div class="container">
    <h1>My Profile</h1>

    <img id="avatar" src="" alt="Avatar" width="120" style="border-radius: 50%;"><br><br>

    <form id="avatar-form">
        <input type="file" name="avatar" id="avatar-input" accept="image/*">
        <button type="submit">Upload avatar</button>
    </form>

    <p id="email"></p>
    <p id="country"></p>
</div>
</body>
</html>
